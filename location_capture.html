<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Location - Room on Rent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .code-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 12px;
            padding: 8px 20px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #60a5fa;
            margin-bottom: 28px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #fff;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.45);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            line-height: 1.5;
        }

        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .status.loading {
            display: block;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .privacy-note {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="card" id="mainCard">
        <div class="logo">📍</div>
        <h1>Share Your Location</h1>
        <p class="subtitle">Someone requested your GPS location to fill in a property address. Tap the button below to
            share it securely.</p>

        <div class="code-badge" id="codeDisplay">------</div>

        <button class="btn btn-primary" id="shareBtn" onclick="shareLocation()">
            <span>📡</span> Share My Location
        </button>

        <div class="status" id="status"></div>

        <p class="privacy-note">🔒 Your location is only used to auto-fill a property address. It is not stored
            permanently.</p>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const SUPABASE_URL = 'https://room-on-rent-ap.akashkumarr1406.workers.dev';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnZG1ld3p1aXF3eGdwdWhudGtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NjcxMTgsImV4cCI6MjA4NzQ0MzExOH0.MpRYrVkAj-NqaLanJg0KveEy3N8sBtDMVQHaIuieaAE';
        const TABLE = 'location_requests';
        // ====================================

        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        if (code) {
            document.getElementById('codeDisplay').textContent = code;
        } else {
            showStatus('error', '❌ Invalid link. No location code found in the URL.');
            document.getElementById('shareBtn').disabled = true;
        }

        function showStatus(type, message) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            el.innerHTML = message;
        }

        // Get location with fallback: try high accuracy first, then low accuracy
        function getLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Geolocation is not supported by your browser.'));
                    return;
                }

                // First try: high accuracy with short timeout
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve(pos),
                    () => {
                        // Fallback: low accuracy (uses WiFi/cell tower, much faster)
                        showStatus('loading', '📡 Trying alternate location method...');
                        navigator.geolocation.getCurrentPosition(
                            (pos) => resolve(pos),
                            (err) => reject(err),
                            { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
                        );
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            });
        }

        async function shareLocation() {
            const btn = document.getElementById('shareBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Getting location...';
            showStatus('loading', '📡 Requesting GPS access... Please allow location permission.');

            try {
                const position = await getLocation();
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                showStatus('loading', '📤 Submitting location to server...');
                btn.innerHTML = '<span class="spinner"></span> Submitting...';

                // Update the location_request in Supabase
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/${TABLE}?code=eq.${code}&status=eq.pending`,
                    {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({
                            latitude: lat,
                            longitude: lng,
                            status: 'completed'
                        })
                    }
                );

                if (response.ok) {
                    document.getElementById('mainCard').innerHTML = `
                        <div class="success-icon">✅</div>
                        <h1>Location Shared!</h1>
                        <p class="subtitle">Your GPS coordinates have been sent successfully.<br>The property owner's form will auto-fill with the address details.</p>
                        <div class="code-badge">${code}</div>
                        <p class="privacy-note">You can safely close this page now.</p>
                    `;
                } else {
                    const errText = await response.text();
                    console.error('Supabase error:', response.status, errText);
                    showStatus('error', `❌ Failed to submit location (${response.status}). The code may have expired, already been used, or the table may not exist yet.`);
                    btn.disabled = false;
                    btn.innerHTML = '<span>📡</span> Try Again';
                }
            } catch (err) {
                console.error('Error:', err);
                let msg = '';
                if (err.code === 1) {
                    msg = '❌ Location access denied. Please allow location in your browser settings and refresh this page.';
                } else if (err.code === 2) {
                    msg = '❌ Location unavailable. Please make sure GPS/Location is enabled on your device and try again.';
                } else if (err.code === 3) {
                    msg = '❌ Location request timed out. Please make sure GPS is enabled and try again.';
                } else if (err.message && err.message.includes('Geolocation')) {
                    msg = '❌ ' + err.message;
                } else {
                    msg = '❌ Error: ' + (err.message || 'Unknown error. Please check your internet connection.');
                }
                showStatus('error', msg);
                btn.disabled = false;
                btn.innerHTML = '<span>📡</span> Try Again';
            }
        }
    </script>
</body>

</html>
